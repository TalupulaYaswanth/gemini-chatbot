<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini AI Chatbot</title>
  <meta name="description" content="A sleek, intelligent AI chatbot powered by Google's Gemini API. Ask anything and get instant, thoughtful responses." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="logo-text">GeminiChat</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn" title="New Chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <!-- API Key Section -->
      <div class="api-section">
        <label class="api-label" for="apiKeyInput">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Gemini API Key
        </label>
        <div class="api-input-wrapper">
          <input type="password" id="apiKeyInput" placeholder="AIza..." class="api-input" autocomplete="off" />
          <button class="eye-btn" id="eyeBtn" title="Toggle visibility">
            <svg id="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <button class="save-key-btn" id="saveKeyBtn">Save Key</button>
        <p class="api-hint">Get your key at <a href="https://aistudio.google.com" target="_blank" rel="noopener">aistudio.google.com</a></p>
      </div>

      <!-- Model selector -->
      <div class="model-section">
        <label class="model-label" for="modelSelect">Model</label>
        <select class="model-select" id="modelSelect">
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
          <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        </select>
      </div>

      <!-- Chat history -->
      <div class="history-section">
        <p class="history-label">Recent Chats</p>
        <ul class="history-list" id="historyList">
          <!-- Populated by JS -->
        </ul>
      </div>

      <div class="sidebar-footer">
        <p class="footer-note">Powered by Google Gemini</p>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main" id="chatMain">
      <!-- Top bar -->
      <header class="chat-header">
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="header-title">
          <span class="status-dot" id="statusDot"></span>
          <h1 id="chatTitle">New Conversation</h1>
        </div>
        <button class="clear-btn" id="clearBtn" title="Clear conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </header>

      <!-- Messages area -->
      <section class="messages-area" id="messagesArea" role="log" aria-live="polite" aria-label="Chat messages">
        <!-- Welcome screen -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#grad1)" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M2 17L12 22L22 17" stroke="url(#grad1)" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M2 12L12 17L22 12" stroke="url(#grad1)" stroke-width="1.5" stroke-linejoin="round"/>
              <defs>
                <linearGradient id="grad1" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#6366f1"/>
                  <stop offset="100%" stop-color="#8b5cf6"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h2 class="welcome-title">How can I help you today?</h2>
          <p class="welcome-sub">Powered by Google Gemini — ask me anything</p>
          <div class="suggestion-grid" id="suggestionGrid">
            <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
              <span class="suggestion-icon">⚛️</span>
              <span>Explain quantum computing in simple terms</span>
            </button>
            <button class="suggestion-card" data-prompt="Write a Python script to sort a list of dictionaries">
              <span class="suggestion-icon">🐍</span>
              <span>Write a Python script to sort a list of dictionaries</span>
            </button>
            <button class="suggestion-card" data-prompt="What are the best practices for REST API design?">
              <span class="suggestion-icon">🔌</span>
              <span>What are the best practices for REST API design?</span>
            </button>
            <button class="suggestion-card" data-prompt="Write a creative short story about a time traveler">
              <span class="suggestion-icon">✍️</span>
              <span>Write a creative short story about a time traveler</span>
            </button>
          </div>
        </div>
      </section>

      <!-- Input area -->
      <footer class="input-area">
        <div class="input-wrapper" id="inputWrapper">
          <textarea
            id="userInput"
            class="user-textarea"
            placeholder="Message Gemini..."
            rows="1"
            aria-label="Type your message"
          ></textarea>
          <div class="input-actions">
            <span class="char-count" id="charCount">0</span>
            <button class="send-btn" id="sendBtn" title="Send message" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
        <p class="input-disclaimer">AI can make mistakes. Verify important information.</p>
      </footer>
    </main>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <script src="app.js"></script>
</body>
</html>
